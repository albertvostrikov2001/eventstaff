# Фрагмент для сайта на Timeweb VPS: статика загрузок с диска приложения.
# Подключите в server { ... } основного виртуального хоста.
#
# UPLOADS_ROOT на сервере должен совпадать с путём в alias (например /opt/app/uploads).

location /uploads/ {
    alias /opt/app/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    location ~* \.(php|py|sh|pl)$ {
        deny all;
    }
}
