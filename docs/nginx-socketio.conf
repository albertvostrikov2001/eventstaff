# Socket.IO proxy block — add inside the `server { ... }` block in your nginx site config.
# PM2 deployment: Fastify API runs on 127.0.0.1:4000, Next.js on 127.0.0.1:3000.
#
# The trailing slash on the location AND proxy_pass is required:
#   location /socket.io/  →  proxy_pass http://127.0.0.1:4000/socket.io/
# Without it nginx emits a 308 redirect which breaks the Socket.IO handshake.

location /socket.io/ {
    proxy_pass         http://127.0.0.1:4000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_buffering    off;
}
