name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check public API URL (login on Pages needs a real API)
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "::warning title=NEXT_PUBLIC_API_URL::Сайт соберётся и задеплоится, но вход в личный кабинет с GitHub Pages не будет работать, пока не задана переменная репозитория NEXT_PUBLIC_API_URL (Settings → Secrets and variables → Actions → Variables). Пример: https://api.example.com/api/v1. См. docs/deploy-github-pages.md"
          else
            echo "NEXT_PUBLIC_API_URL задан — сборка с публичным API."
          fi
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      # Next.js static export does not support middleware (no Node server on Pages).
      - name: Disable middleware for static export
        run: mv packages/web/src/middleware.ts packages/web/src/middleware.static.bak.ts

      - name: Build static site
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: pnpm --filter @unity/web exec next build

      - name: Add .nojekyll (GitHub Pages + paths with _)
        run: touch packages/web/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
