name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    env:
      # Prisma reads DATABASE_URL from the schema even for `prisma generate` (no real DB connection).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm lint

      - run: pnpm exec turbo typecheck --filter=@unity/web --filter=@unity/shared
