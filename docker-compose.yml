services:
  postgres:
    image: postgres:15-alpine
    container_name: unity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unity
      POSTGRES_PASSWORD: unity_secret
      POSTGRES_DB: unity_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unity -d unity_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unity-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: unity-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://unity:unity_secret@postgres:5432/unity_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-docker-change-me-to-random-string
      JWT_REFRESH_SECRET: local-docker-refresh-change-me
      NODE_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://127.0.0.1:4000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 45s

  adminer:
    image: adminer:latest
    container_name: unity-adminer
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    name: unity-postgres-data
  redis_data:
    name: unity-redis-data
