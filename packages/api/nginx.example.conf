# Example Nginx configuration snippets for Unity Event Staff Platform API

upstream unity_api {
    server 127.0.0.1:4000;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.ru;

    # SSL certificates — configure separately

    location /api/ {
        proxy_pass http://unity_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / Socket.IO
    location /socket.io/ {
        proxy_pass http://unity_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static media uploads
    location /uploads/ {
        alias /opt/app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        location ~* \.(php|py|sh|pl)$ {
            deny all;
        }
    }

    # Block API docs in production (optional — if not using auth on /docs)
    # location /docs {
    #     deny all;
    # }
}
