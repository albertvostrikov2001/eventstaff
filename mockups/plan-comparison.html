<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Юнити — сравнение тарифов (макет попапа)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a120e;
    --emerald:#2d6a4a;
    --emerald-light:#4fa76e;
    --grad:linear-gradient(135deg,#2d6a4a,#4fa76e);
    --card:rgba(255,255,255,0.04);
    --line:rgba(255,255,255,0.1);
    --t1:#ffffff;
    --t2:rgba(255,255,255,0.6);
    --t3:rgba(255,255,255,0.4);
    --serif:'Playfair Display',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #16291d 0%, var(--bg) 60%);
    min-height:100vh;color:var(--t1);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }

  /* ── Overlay + popup ── */
  .overlay{
    width:100%;max-width:560px;
  }
  .popup{
    position:relative;border-radius:22px;overflow:hidden;
    background:linear-gradient(168deg,rgba(20,35,25,0.98),rgba(10,18,14,0.99));
    border:1px solid var(--line);
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    display:flex;flex-direction:column;
  }

  /* ── Header ── */
  .head{padding:20px 22px 0;display:flex;flex-direction:column;gap:16px}
  .head-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .head-title{font-family:var(--serif);font-size:1.45rem;font-weight:600;line-height:1.2}
  .head-sub{font-size:.8rem;color:var(--t3);margin-top:3px}
  .close{
    flex:none;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,0.05);color:var(--t3);font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  .close:hover{background:rgba(255,255,255,0.1);color:var(--t1)}

  /* ── Audience toggle ── */
  .toggle{display:inline-flex;flex-wrap:wrap;gap:2px;padding:4px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--line);align-self:flex-start}
  .toggle button{
    border:none;cursor:pointer;background:transparent;color:var(--t2);
    font:inherit;font-size:.84rem;font-weight:500;padding:8px 15px;border-radius:9px;transition:.2s;white-space:nowrap;
  }
  .toggle button.active{background:var(--grad);color:#fff;box-shadow:0 2px 10px rgba(45,106,74,0.35)}

  /* ── Stage / track ── */
  .stage{overflow:hidden;touch-action:pan-y}
  .track{display:flex;transition:transform .38s cubic-bezier(.4,0,.2,1)}
  .slide{min-width:100%;padding:22px;display:flex;flex-direction:column;gap:18px}

  .slide-eyebrow{
    display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
    font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--emerald-light);background:rgba(79,167,110,0.12);
    padding:6px 12px;border-radius:999px;
  }
  .slide-title{font-family:var(--serif);font-size:1.5rem;font-weight:600;line-height:1.25}
  .slide-text{font-size:.92rem;line-height:1.6;color:var(--t2)}

  /* illustration frame */
  .ill{
    border-radius:16px;border:1px solid var(--line);
    background:rgba(255,255,255,0.025);padding:16px;
    display:flex;align-items:center;justify-content:center;min-height:150px;
  }
  .ill svg{width:100%;height:auto;display:block}

  /* compare strip */
  .cmp{display:grid;gap:10px}
  .cmp.two{grid-template-columns:1fr 1fr}
  .cmp.three{grid-template-columns:1fr 1fr 1fr}
  .cmp-col{
    border-radius:13px;border:1px solid var(--line);padding:12px 12px 13px;
    background:rgba(255,255,255,0.03);text-align:center;position:relative;
  }
  .cmp-col.best{border-color:rgba(79,167,110,0.55);background:linear-gradient(180deg,rgba(45,106,74,0.14),rgba(255,255,255,0.03))}
  .cmp-plan{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--t3)}
  .cmp-col.best .cmp-plan{color:var(--emerald-light)}
  .cmp-val{font-family:var(--serif);font-size:1.45rem;font-weight:600;margin-top:4px;line-height:1.1}
  .cmp-note{font-size:.72rem;color:var(--t3);margin-top:3px;min-height:1em}
  .cmp-tag{
    position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    font-size:.62rem;font-weight:600;color:#fff;background:var(--emerald);
    padding:3px 9px;border-radius:999px;white-space:nowrap;
  }

  /* boosts grid */
  .blist{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bcard{
    border-radius:13px;border:1px solid var(--line);padding:12px 13px;
    background:rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:5px;position:relative;
  }
  .bcard.accent{border-color:rgba(79,167,110,0.45);background:linear-gradient(180deg,rgba(45,106,74,0.12),rgba(255,255,255,0.03))}
  .bcard-top{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .bcard-price{font-family:var(--serif);font-size:1.15rem;font-weight:600;line-height:1}
  .bcard-per{font-size:.7rem;color:var(--t3)}
  .bcard-badge{
    position:absolute;top:-8px;right:10px;font-size:.6rem;font-weight:600;color:#fff;
    background:var(--emerald);padding:2px 8px;border-radius:999px;
  }
  .bcard-title{font-size:.84rem;font-weight:600;line-height:1.25}
  .bcard-desc{font-size:.74rem;line-height:1.45;color:var(--t3)}
  @media(max-width:420px){.blist{grid-template-columns:1fr}}

  /* ── Footer ── */
  .foot{padding:6px 22px 22px;display:flex;flex-direction:column;gap:16px}
  .dots{display:flex;gap:7px;justify-content:center;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;padding:0;cursor:pointer;transition:.25s}
  .dot.active{width:22px;border-radius:99px;background:var(--emerald-light)}
  .foot-row{display:flex;align-items:center;gap:10px}
  .nav{
    flex:none;width:44px;height:44px;border-radius:12px;cursor:pointer;
    background:rgba(255,255,255,0.05);border:1px solid var(--line);color:var(--t1);
    font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  .nav:hover:not(:disabled){background:rgba(255,255,255,0.1)}
  .nav:disabled{opacity:.3;cursor:default}
  .cta{
    flex:1;border:none;cursor:pointer;border-radius:12px;padding:14px;
    font:inherit;font-size:.95rem;font-weight:600;color:#fff;background:var(--grad);
    transition:.2s;box-shadow:0 4px 18px rgba(45,106,74,0.35);
  }
  .cta:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(45,106,74,0.5)}
  .cta.ghost{background:transparent;border:1.5px solid rgba(255,255,255,0.28);color:rgba(255,255,255,0.9);box-shadow:none}
  .cta.ghost:hover{border-color:rgba(255,255,255,0.5);transform:none}

  @media(max-width:420px){
    .slide-title{font-size:1.3rem}.cmp-val{font-size:1.2rem}
  }
</style>
</head>
<body>
  <div class="overlay">
    <div class="popup">
      <div class="head">
        <div class="head-top">
          <div>
            <div class="head-title">Сравните тарифы</div>
            <div class="head-sub" id="head-sub">Что даёт платная подписка</div>
          </div>
          <button class="close" aria-label="Закрыть">&times;</button>
        </div>
        <div class="toggle" role="tablist">
          <button data-aud="employer" class="active">Работодателям</button>
          <button data-aud="worker">Специалистам</button>
          <button data-aud="services">Разовые услуги</button>
        </div>
      </div>

      <div class="stage" id="stage">
        <div class="track" id="track"></div>
      </div>

      <div class="foot">
        <div class="dots" id="dots"></div>
        <div class="foot-row">
          <button class="nav" id="prev" aria-label="Назад">&#8249;</button>
          <button class="cta" id="cta">Далее</button>
          <button class="nav" id="next" aria-label="Вперёд">&#8250;</button>
        </div>
      </div>
    </div>

const SLIDES={

/* ── Render + carousel logic ── */
let aud='employer', idx=0;
const track=document.getElementById('track');
const dots=document.getElementById('dots');
const prev=document.getElementById('prev');
const next=document.getElementById('next');
const cta=document.getElementById('cta');
const headSub=document.getElementById('head-sub');

function cmpHTML(c){
  const items=c.items.map(it=>`<div class="cmp-col${it.best?' best':''}">
    ${it.tag?`<span class="cmp-tag">${it.tag}</span>`:''}
    <div class="cmp-plan">${it.plan}</div>
    <div class="cmp-val">${it.val}</div>
    <div class="cmp-note">${it.note||''}</div>
  </div>`).join('');
  return `<div class="cmp ${c.cols}">${items}</div>`;
}

function boostsHTML(items){
  return `<div class="blist">${items.map(b=>`<div class="bcard${b.badge?' accent':''}">
    ${b.badge?`<span class="bcard-badge">${b.badge}</span>`:''}
    <div class="bcard-top"><span class="bcard-price">${b.price}</span>${b.per?`<span class="bcard-per">/ ${b.per}</span>`:''}</div>
    <div class="bcard-title">${b.title}</div>
    <div class="bcard-desc">${b.desc}</div>
  </div>`).join('')}</div>`;
}

function render(){
  const list=SLIDES[aud];
  track.innerHTML=list.map(s=>`<div class="slide">
    <span class="slide-eyebrow">${s.eyebrow}</span>
    <div class="slide-title">${s.title}</div>
    ${s.boosts?boostsHTML(s.boosts):`<div class="ill">${s.ill}</div>`}
    ${s.cmp?cmpHTML(s.cmp):''}
    <div class="slide-text">${s.text}</div>
  </div>`).join('');
  dots.innerHTML=list.map((_,i)=>`<button class="dot${i===0?' active':''}" data-i="${i}" aria-label="Слайд ${i+1}"></button>`).join('');
  idx=0;update();
}

function update(){
  const list=SLIDES[aud];
  track.style.transform=`translateX(-${idx*100}%)`;
  [...dots.children].forEach((d,i)=>d.classList.toggle('active',i===idx));
  prev.disabled=idx===0;
  const s=list[idx];
  const last=idx===list.length-1;
  cta.textContent=s.final?s.cta:(last?s.cta||'Готово':'Далее');
  cta.classList.toggle('ghost',!s.final&&!last);
  headSub.textContent=aud==='employer'?'Что даёт платная подписка работодателю':aud==='worker'?'Что даёт Premium специалисту':'Разовое продвижение без подписки';
}

function go(n){const list=SLIDES[aud];idx=Math.max(0,Math.min(list.length-1,n));update();}

next.onclick=()=>go(idx+1);
prev.onclick=()=>go(idx-1);
cta.onclick=()=>{const list=SLIDES[aud];if(idx<list.length-1)go(idx+1);else alert('Демо: здесь будет переход к оформлению тарифа.');};
dots.onclick=e=>{const b=e.target.closest('.dot');if(b)go(+b.dataset.i);};

document.querySelectorAll('.toggle button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');aud=b.dataset.aud;render();
  };
});

/* keyboard + swipe */
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(idx+1);if(e.key==='ArrowLeft')go(idx-1);});
let sx=0,sw=false;
const stage=document.getElementById('stage');
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sw=true;},{passive:true});
stage.addEventListener('touchend',e=>{if(!sw)return;sw=false;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>45)go(idx+(dx<0?1:-1));});
stage.addEventListener('mousedown',e=>{sx=e.clientX;sw=true;});
window.addEventListener('mouseup',e=>{if(!sw)return;sw=false;const dx=e.clientX-sx;if(Math.abs(dx)>60)go(idx+(dx<0?1:-1));});

document.querySelector('.close').onclick=()=>alert('Демо: здесь попап закроется.');

render();
</script>
